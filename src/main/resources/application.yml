spring:
  application:
    name: tenpo-challenge
  profiles:
    default: dev
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

percentage-provider:
  http:
    base-url: ${PERCENTAGE_PROVIDER_BASE_URL:https://percentage-provider.local}
    path: ${PERCENTAGE_PROVIDER_PATH:/percentage}
  retry:
    name: ${PERCENTAGE_PROVIDER_RETRY_NAME:percentage-provider}
    max-attempts: ${PERCENTAGE_PROVIDER_RETRY_MAX_ATTEMPTS:3}
    initial-backoff: ${PERCENTAGE_PROVIDER_RETRY_INITIAL_BACKOFF:100ms}
    backoff-multiplier: ${PERCENTAGE_PROVIDER_RETRY_BACKOFF_MULTIPLIER:2.0}

rate-limit:
  capacity: ${RATE_LIMIT_CAPACITY:3}
  refill-tokens: ${RATE_LIMIT_REFILL_TOKENS:3}
  refill-period: ${RATE_LIMIT_REFILL_PERIOD:1m}
  cache-ttl: ${RATE_LIMIT_CACHE_TTL:2m}
  path-policies:
    - pattern: "/swagger-ui/**"
      capacity: 60
      refill-tokens: 60
      refill-period: 1m
    - pattern: "/v3/api-docs/**"
      capacity: 60
      refill-tokens: 60
      refill-period: 1m
    - pattern: "/actuator/**"
      capacity: 60
      refill-tokens: 60
      refill-period: 1m

call-history:
  async:
    concurrency-limit: ${CALL_HISTORY_ASYNC_CONCURRENCY_LIMIT:2}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
